<main class="w-full">
    <div class="bg-[#000000] px-5 flex items-center justify-between gap-2 w-full h-[40px]">
        <div class="flex items-center gap-3">
            <a href="https://web.facebook.com/alfredsusan57" target="_blank"><img width="20" alt="facebook image" src="/assets/images/facebook.svg"></a>
            <a href="https://www.instagram.com/alfredsusaneventcenter_/" target="_blank"><img width="20" alt="instagram image" src="/assets/images/instagram.svg"></a>
        </div>
    </div>
    <nav id="navbar" class="z-[999] flex items-center justify-between w-full h-[75px] px-5 md:px-8" (scroll)="onScroll()" [ngClass]="navbarFixed? 'fixed': 'notfixed'" style="background-color: var(--bg-primary); border-bottom: 1px solid var(--border-color);">
        <a routerLink="/main/home"><img src="/assets/logo/logo-no-background.svg" class="w-[130px] lg:w-[160px] xl:w-[190px] cursor-pointer" alt="ASEC Logo"></a>
        <div class="flex h-full items-center gap-6 lg:gap-8 list-none md:text-sm lg:text-base font-medium nav-links">
            <li *ngFor="let link of navLinks" [routerLink]="[link.link]" routerLinkActive="active-nav-link" class="py-2">{{link.title}}</li>
        </div>
        <div class="flex items-center gap-3">
            <app-theme-toggle></app-theme-toggle>
            <button [routerLink]="['/main/book-event']" class="btn-primary text-sm lg:text-base px-4 lg:px-6 py-2.5">
                Book Event
            </button>
        </div>
        <input type="checkbox" id="ham-menu">
        <label for="ham-menu" class="md:hidden" (click)="onNavClick()">
            <div class="hide-des">
                <span class="menu-line"></span>
                <span class="menu-line"></span>
                <span class="menu-line"></span>
                <span class="menu-line"></span>
                <span class="menu-line"></span>
                <span class="menu-line"></span>
            </div>
        </label>
    </nav>
</main>
